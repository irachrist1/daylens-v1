# Daylens AI regression corpus.
#
# Each entry pins one user question to a deterministic fixture plus a set of
# expected-answer characteristics. The harness runs router-mode assertions in
# CI and adds live-provider assertions when AI_BENCH_LIVE=1 and a relevant API
# key is in the environment.
#
# Schema:
#   id              unique short identifier
#   question        the user message, verbatim
#   fixture         name from tests/ai-bench/fixtures.ts
#   mode            router | both
#   provider        optional, restricts live-mode entries to a provider
#   note            optional human comment, e.g. "known router gap: domain time"
#   expect:
#     router_kind   answer | weeklyBrief | null | any
#     must_include  case-insensitive substrings the answer must contain
#     must_not_include   substrings the answer must NOT contain
#     min_length    minimum trimmed answer length in characters
#     must_cite_block    if true, answer must contain a time/duration shape
#     live_*        same shape, applied to the live-provider answer when run
#
# Calibration rule: every entry encodes either (a) current router behavior
# pinned so regressions show up, or (b) an explicit deferral to the provider
# path. Entries marked `note: gap` are known router shortcomings that should
# graduate to `router_kind: answer` once filled.

